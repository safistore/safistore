<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFI STORE Products</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
font-size:24px;
}

.cart-link{
color:white;
text-decoration:none;
font-size:18px;
background:#28a745;
padding:10px 15px;
border-radius:5px;
}

.cart-link:hover{
background:#218838;
}

.products-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
}

.product-card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 10px rgba(0,0,0,.1);
transition:0.3s;
}

.product-card:hover{
transform:translateY(-5px);
}

.product-card img{
width:100%;
height:300px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-info h3{
margin-bottom:10px;
}

.product-info p{
margin-bottom:10px;
color:#555;
}

.price{
font-size:22px;
font-weight:bold;
color:green;
margin-bottom:10px;
}

.sizes,
.colors{
margin-bottom:10px;
}

.buy-btn{
width:100%;
padding:12px;
background:#111;
color:white;
border:none;
cursor:pointer;
font-size:16px;
border-radius:5px;
}

.buy-btn:hover{
background:#333;
}

.loading{
text-align:center;
padding:30px;
font-size:20px;
}

</style>
</head>
<body>

<header>

<h1>SAFI STORE</h1>

<a href="cart.html" class="cart-link">
🛒 Cart
</a>

</header>

<div id="productsContainer" class="products-container">

<div class="loading">
Loading Products...
</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAszpqCGgqPq-a90hcpy7lO5VrpNRfMxSQ",
authDomain: "safistore-c956b.firebaseapp.com",
projectId: "safistore-c956b",
storageBucket: "safistore-c956b.appspot.com",
messagingSenderId: "977849577729",
appId: "1:977849577729:web:4dd4ce0f93b31ee6e2eb00"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.addToCart = function(id,name,image,price){

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const existingProduct =
cart.find(item => item.id === id);

if(existingProduct){

existingProduct.quantity += 1;

}else{

cart.push({
id:id,
name:name,
image:image,
price:Number(price),
quantity:1
});

}

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert(name + " added to cart");

};

async function loadProducts(){

const container =
document.getElementById("productsContainer");

container.innerHTML = "";

const snapshot =
await getDocs(
collection(db,"products")
);

if(snapshot.empty){

container.innerHTML = `
<h2 style="text-align:center;width:100%;">
No Products Found
</h2>
`;

return;

}

snapshot.forEach(product=>{

const data = product.data();

container.innerHTML += `

<div class="product-card">

<img src="${data.image}" alt="${data.name}">

<div class="product-info">

<h3>${data.name}</h3>

<p>${data.description}</p>

<div class="price">
₹${data.price}
</div>

<div class="sizes">
<b>Sizes:</b>
${data.sizes ? data.sizes.join(", ") : "Standard"}
</div>

<div class="colors">
<b>Colors:</b>
${data.colors ? data.colors.join(", ") : "Default"}
</div>

<button
class="buy-btn"
onclick='addToCart(
"${product.id}",
"${data.name}",
"${data.image}",
"${data.price}"
)'>

Add To Cart

</button>

</div>

</div>

`;

});

}

loadProducts();

</script>

</body>
</html>
