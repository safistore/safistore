<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: #333;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 20px;
    }

    .cart {
      position: fixed;
      top: 15px;
      right: 20px;
      background: red;
      color: white;
      padding: 8px 12px;
      border-radius: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .product {
      background: white;
      width: 250px;
      margin: 15px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      overflow: hidden;
      text-align: center;
    }

    .product img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .product h3 {
      margin: 10px 0;
    }

    .product p {
      color: #555;
    }

    .product button {
      background: green;
      color: white;
      border: none;
      padding: 10px;
      width: 100%;
      cursor: pointer;
      font-size: 16px;
    }

    .product button:hover {
      background: darkgreen;
    }

    @media (max-width: 600px) {
      .product {
        width: 90%;
      }
    }
  </style>
</head>

<body>

  <header>
    🛒 My Products Store
  </header>

  <div class="cart">
    Cart: <span id="cartCount">0</span>
  </div>

  <div class="container">

    <div class="product">
      <img src="https://via.placeholder.com/250x180" alt="Product 1">
      <h3>Product 1</h3>
      <p>₹500</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250x180" alt="Product 2">
      <h3>Product 2</h3>
      <p>₹800</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250x180" alt="Product 3">
      <h3>Product 3</h3>
      <p>₹1200</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

    <div class="product">
      <img src="https://via.placeholder.com/250x180" alt="Product 4">
      <h3>Product 4</h3>
      <p>₹1500</p>
      <button onclick="addToCart()">Add to Cart</button>
    </div>

  </div>

  <script>
    let cartCount = 0;

    function addToCart() {
      cartCount++;
      document.getElementById("cartCount").innerText = cartCount;
    }
  </script>

</body>
</html>
