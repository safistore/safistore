<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFI STORE - Products</title>

<link rel="stylesheet" href="products.css">

</head>
<body>

<header>

    <h1>SAFI STORE</h1>

    <a href="cart.html" class="cart-link">
        🛒 Cart
    </a>

</header>

<div id="productsContainer" class="products-container">

    <div class="loading">
        Loading Products...
    </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";

import {
    getFirestore,
    collection,
    getDocs
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

/* Firebase Config */

const firebaseConfig = {
    apiKey: "AIzaSyAszpqCGgqPq-a90hcpy7lO5VrpNRfMxSQ",
    authDomain: "safistore-c956b.firebaseapp.com",
    projectId: "safistore-c956b",
    storageBucket: "safistore-c956b.appspot.com",
    messagingSenderId: "977849577729",
    appId: "1:977849577729:web:4dd4ce0f93b31ee6e2eb00"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* Add To Cart */

window.addToCart = function(id,name,image,price){

    let cart =
    JSON.parse(localStorage.getItem("cart")) || [];

    const existingProduct =
    cart.find(item => item.id === id);

    if(existingProduct){

        existingProduct.quantity += 1;

    }else{

        cart.push({
            id: id,
            name: name,
            image: image,
            price: Number(price),
            quantity: 1
        });

    }

    localStorage.setItem(
        "cart",
        JSON.stringify(cart)
    );

    alert(name + " added to cart!");

};

/* Button Click Handler */

window.addToCartFromButton = function(button){

    const id = button.dataset.id;
    const name = button.dataset.name;
    const image = button.dataset.image;
    const price = button.dataset.price;

    addToCart(id,name,image,price);

};

/* Load Products */

async function loadProducts(){

    const container =
    document.getElementById("productsContainer");

    container.innerHTML = "";

    try{

        const snapshot =
        await getDocs(
            collection(db,"products")
        );

        if(snapshot.empty){

            container.innerHTML = `
            <div class="no-products">
                <h2>No Products Available</h2>
            </div>
            `;

            return;
        }

        snapshot.forEach(product => {

            const data = product.data();

            container.innerHTML += `

            <div class="product-card">

                <img
                src="${data.image}"
                alt="${data.name}">

                <div class="product-info">

                    <h3>${data.name}</h3>

                    <p>${data.description}</p>

                    <div class="price">
                        ₹${data.price}
                    </div>

                    <div class="sizes">
                        <b>Sizes:</b>
                        ${
                            data.sizes
                            ? data.sizes.join(", ")
                            : "Standard"
                        }
                    </div>

                    <div class="colors">
                        <b>Colours:</b>
                        ${
                            data.colors
                            ? data.colors.join(", ")
                            : "Default"
                        }
                    </div>

                    <button
                    class="buy-btn"
                    data-id="${product.id}"
                    data-name="${data.name}"
                    data-image="${data.image}"
                    data-price="${data.price}"
                    onclick="addToCartFromButton(this)">

                        Add To Cart

                    </button>

                </div>

            </div>

            `;

        });

    }catch(error){

        console.error(error);

        container.innerHTML = `
        <div class="no-products">
            <h2>Error Loading Products</h2>
        </div>
        `;
    }

}

loadProducts();

</script>

</body>
</html>
