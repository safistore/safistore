<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Safi Store</title>

<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-box">

        <img src="safi.png" class="auth-logo" alt="Safi Store">

        <h2>Login</h2>

        <form id="loginForm">

            <input
                type="email"
                id="loginEmail"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="loginPassword"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="registered.html">Register</a>
        </p>

    </div>

</div>

<script type="module" src="auth.js"></script>

</body>
</html>
