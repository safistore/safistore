<div class="customer-form">

    <input
    type="text"
    id="customerName"
    placeholder="Full Name"
    required>

    <input
    type="tel"
    id="customerPhone"
    placeholder="Mobile Number"
    required>

    <input
    type="email"
    id="customerEmail"
    placeholder="Email Address">

    <input
    type="text"
    id="customerCity"
    placeholder="City"
    required>

    <input
    type="text"
    id="customerState"
    placeholder="State"
    required>

    <input
    type="text"
    id="customerPincode"
    placeholder="Pincode"
    required>

    <textarea
    id="customerAddress"
    placeholder="Full Shipping Address"
    rows="4"
    required></textarea>

</div>
