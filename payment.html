<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Payment | Safi Store</title>

<link rel="stylesheet" href="payment.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>
<body>

<header>

    <div class="logo">
        SAFI STORE
    </div>

    <a href="cart.html" class="back-btn">
        <i class="fa-solid fa-arrow-left"></i>
        Back To Cart
    </a>

</header>

<section class="payment-page">

    <div class="payment-card">

        <h1>Complete Your Payment</h1>

        <p class="subtitle">
            Scan the QR code or copy the UPI ID below.
        </p>

        <div class="qr-container">

            <img
            src="qr.jpeg"
            alt="Payment QR"
            class="qr-image">

        </div>

        <div class="upi-box">

            <span>UPI ID</span>

            <div class="upi-copy">

                <h3 id="upiId">
                    9345314960@axl
                </h3>

                <button
                id="copyBtn"
                onclick="copyUPI()">

                    Copy

                </button>

            </div>

        </div>

        <div class="amount-box">

            <span>Total Amount</span>

            <h2 id="orderTotal">
                ₹0
            </h2>

        </div>

        <div class="instructions">

            <h4>Instructions</h4>

            <ul>

                <li>Scan QR code or use UPI ID.</li>

                <li>Complete payment.</li>

                <li>Take a screenshot.</li>

                <li>Click "I've Finished Payment".</li>

                <li>Attach screenshot in WhatsApp.</li>

            </ul>

        </div>

        <button
        id="finishPaymentBtn">

            I've Finished Payment

        </button>

    </div>

</section>

<script src="payment.js"></script>

</body>
</html>
