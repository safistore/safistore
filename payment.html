<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment - Safi Store</title>

<link rel="stylesheet" href="payment.css">
</head>
<body>

<div class="payment-container">

    <h1>Safi Store Payment</h1>

    <div class="payment-box">

        <h2>Scan QR To Pay</h2>

        <img src="qr.jpeg" alt="QR Payment" class="qr-image">

        <h3>UPI ID</h3>

        <div class="upi-box">

            <input
                type="text"
                id="upiId"
                value="9345314960@axl"
                readonly
            >

            <button onclick="copyUPI()">
                Copy
            </button>

        </div>

    </div>

    <div class="shipping-box">

        <h2>Shipping Details</h2>

        <form id="orderForm">

            <input
                type="text"
                id="customerName"
                placeholder="Full Name"
                required
            >

            <input
                type="tel"
                id="customerPhone"
                placeholder="WhatsApp Number"
                required
            >

            <textarea
                id="customerAddress"
                placeholder="Full Shipping Address"
                required
            ></textarea>

            <button type="submit">
                Place Order
            </button>

        </form>

    </div>

</div>

<script type="module" src="payment.js"></script>

</body>
</html>
