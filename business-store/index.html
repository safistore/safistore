<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Safiq Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Safiq Store</div>

        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <section class="hero">
        <h1>Men's & Women's Products</h1>
        <p>Quality products at affordable prices.</p>
    </section>

    <section class="products">

        <div class="product-card">
            <img src="images/product1.jpg" alt="Watch">
            <h3>Premium Watch</h3>
            <p>₹999</p>

            <button
            onclick="orderProduct('Premium Watch','999')">
            Order Now
            </button>
        </div>

        <div class="product-card">
            <img src="images/product2.jpg" alt="Hand Bag">
            <h3>Ladies Hand Bag</h3>
            <p>₹699</p>

            <button
            onclick="orderProduct('Ladies Hand Bag','699')">
            Order Now
            </button>
        </div>

    </section>

    <footer>
        <p>© 2026 Safiq Store. All Rights Reserved.</p>
    </footer>

<script src="script.js"></script>
</body>
</html>
