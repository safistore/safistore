<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>My Cart | Safi Store</title>

<link rel="stylesheet"
href="css/cart.css">

<link
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
rel="stylesheet">

</head>
<body>

<header>

    <div class="logo">
        SAFI STORE
    </div>

    <a href="index.html"
    class="back-btn">

        <i class="fa-solid fa-arrow-left"></i>

        Continue Shopping

    </a>

</header>

<main class="cart-page">

    <!-- LEFT -->

    <section class="cart-container">

        <h2>
            Shopping Cart
        </h2>

        <div id="cartList">

        </div>

    </section>

    <!-- RIGHT -->

    <aside class="summary">

        <h2>
            Order Summary
        </h2>

        <div class="summary-box">

            <div class="row">

                <span>
                    Items
                </span>

                <span
                id="totalItems">

                    0

                </span>

            </div>

            <div class="row">

                <span>
                    Total
                </span>

                <span
                id="totalPrice">

                    ₹0

                </span>

            </div>

            <hr>

            <button
            id="paymentBtn">

                Proceed To Payment

            </button>

        </div>

    </aside>

</main>

<script src="js/cart.js"></script>

</body>
</html>
