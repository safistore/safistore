<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFI STORE Admin Panel</title>

<link rel="icon" href="safi.png">
<link rel="stylesheet" href="admin.css">

</head>

<body>

<header class="header">

    <div class="logo-box">

        <img src="safi.png" alt="SAFI STORE" class="logo">

        <h1>SAFI STORE ADMIN</h1>

    </div>

    <nav>

        <a href="dashboard.html">Dashboard</a>

        <a href="#products">Products</a>

        <a href="#orders">Orders</a>

        <a href="index.html">Website</a>

    </nav>

</header>

<div class="container">

    <!-- ADD PRODUCT -->

    <section id="products">

        <h2>Add Product</h2>

        <div class="product-form">

            <input
            type="text"
            id="productName"
            placeholder="Product Name">

            <textarea
            id="productDescription"
            placeholder="Product Description"></textarea>

            <input
            type="number"
            id="productPrice"
            placeholder="Product Price">

            <input
            type="text"
            id="productImage"
            placeholder="Main Image URL">

            <input
            type="text"
            id="productSizes"
            placeholder="Sizes (S,M,L or Standard)">

            <input
            type="text"
            id="productColors"
            placeholder="Colors (Black,Blue,White)">

            <button onclick="addProduct()">
                Add Product
            </button>

        </div>

    </section>

    <!-- PRODUCTS LIST -->

    <section>

        <h2>Products</h2>

        <div id="productsContainer">

            Loading Products...

        </div>

    </section>

    <!-- ORDERS -->

    <section id="orders">

        <h2>Customer Orders</h2>

        <div id="ordersContainer">

            Loading Orders...

        </div>

    </section>

</div>

<script type="module" src="admin.js"></script>

</body>

</html>
