<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Safi Store</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

</head>

<body>

<header>

    <div class="brand">

        <img
        src="safi.png"
        alt="Safi Store Logo"
        class="logo-img">

        <div class="logo-text">

            <h2>SAFI STORE</h2>

            <p>Premium Shopping</p>

        </div>

    </div>

    <a href="cart.html" class="cart-btn">
        🛒 Cart
    </a>

</header>

<section class="hero">

    <h1>Premium Shopping Store</h1>

    <p>Your Trusted Online Shopping Destination</p>

</section>

<!-- SEARCH -->

<div class="search-container">

    <input
    type="text"
    id="searchInput"
    placeholder="🔍 Search Products..."
    onkeyup="searchProducts()">

</div>

<!-- PRODUCTS -->

<section class="products">

    <!-- PRODUCT 1 -->

    <div class="product-card">

        <img src="products/watch.jpg" alt="Watch">

        <h3>Premium Watch</h3>

        <p>Luxury waterproof wrist watch.</p>

        <h4>₹999</h4>

        <select id="size1">
            <option>Standard</option>
        </select>

        <select id="color1">
            <option>Black</option>
            <option>Silver</option>
            <option>Gold</option>
        </select>

        <button onclick="addProduct(
        1,
        'Premium Watch',
        999,
        'products/watch.jpg',
        'size1',
        'color1'
        )">

            Add To Cart

        </button>

    </div>

    <!-- PRODUCT 2 -->

    <div class="product-card">

        <img src="products/bag.jpg" alt="Bag">

        <h3>Travel Bag</h3>

        <p>Premium quality travel backpack.</p>

        <h4>₹1299</h4>

        <select id="size2">
            <option>Small</option>
            <option>Medium</option>
            <option>Large</option>
        </select>

        <select id="color2">
            <option>Black</option>
            <option>Blue</option>
        </select>

        <button onclick="addProduct(
        2,
        'Travel Bag',
        1299,
        'products/bag.jpg',
        'size2',
        'color2'
        )">

            Add To Cart

        </button>

    </div>

    <!-- PRODUCT 3 -->

    <div class="product-card">

        <img src="products/shoes.jpg" alt="Shoes">

        <h3>Running Shoes</h3>

        <p>Comfortable sports running shoes.</p>

        <h4>₹1499</h4>

        <select id="size3">
            <option>UK 6</option>
            <option>UK 7</option>
            <option>UK 8</option>
            <option>UK 9</option>
        </select>

        <select id="color3">
            <option>Black</option>
            <option>White</option>
        </select>

        <button onclick="addProduct(
        3,
        'Running Shoes',
        1499,
        'products/shoes.jpg',
        'size3',
        'color3'
        )">

            Add To Cart

        </button>

    </div>

    <!-- Continue Products 4–10 exactly like the version I generated earlier -->

</section>

<script src="script.js"></script>

</body>
</html>
