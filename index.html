<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Business Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

header{
    background:#222;
    color:white;
    text-align:center;
    padding:20px;
}

.products{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    width:250px;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin-bottom:10px;
}

.price{
    color:green;
    font-size:20px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:10px;
    border:none;
    background:#25D366;
    color:white;
    cursor:pointer;
    font-size:16px;
    border-radius:5px;
}

button:hover{
    opacity:0.9;
}
</style>
</head>
<body>

<header>
    <h1>My Business Store</h1>
    <p>Men's & Women's Products</p>
</header>

<section class="products">

    <div class="card">
        <img src="https://via.placeholder.com/250x250" alt="Product">
        <div class="card-content">
            <h3>Hand Bag</h3>
            <p class="price">₹699</p>
            <button onclick="orderProduct('Hand Bag',699)">
                Order on WhatsApp
            </button>
        </div>
    </div>

    <div class="card">
        <img src="bracelet.jpeg" alt="Product">
        <div class="card-content">
            <h3>bracelet</h3>
            <p class="price">₹199</p>
            <button onclick="orderProduct('bracelet',199)">
                Order on WhatsApp
            </button>
        </div>
    </div>

</section>

<script>
function orderProduct(product, price){

    let phone = "919345314960"; // Replace with your WhatsApp number

    let message =
    `Hello, I want to order:\n\nProduct: ${product}\nPrice: ₹${price}`;

    let url =
    `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

    window.open(url, "_blank");
}
</script>

</body>
</html>
