<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAFI STORE</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

<!-- HEADER -->

<header>

    <div class="brand">

        <img
        src="safi.png"
        alt="SAFI STORE"
        class="logo-img">

        <h2 class="site-title">
            SAFI STORE
        </h2>

    </div>

    <a href="cart.html" class="cart-btn">
        🛒 Cart
    </a>

</header>

<!-- HERO -->

<section class="hero">

    <h1>
        Welcome To SAFI STORE
    </h1>

    <p>
        Premium Products • Fast Delivery • Secure Shopping
    </p>

</section>

<!-- SEARCH -->

<div class="search-container">

    <input
    type="text"
    id="searchInput"
    placeholder="🔍 Search Products..."
    onkeyup="searchProducts()">

</div>

<!-- PRODUCTS -->

<section class="products">

    <!-- PRODUCT 1 -->

    <div class="product-card">

        <img
        src="products/watch.jpg"
        alt="Watch">

        <h3>Premium Watch</h3>

        <p>
            Luxury waterproof wrist watch.
        </p>

        <h4>₹999</h4>

        <select id="size1">
            <option>Standard</option>
        </select>

        <select id="color1">
            <option>Black</option>
            <option>Silver</option>
            <option>Gold</option>
        </select>

        <button onclick="addProduct(
        1,
        'Premium Watch',
        999,
        'products/watch.jpg',
        'size1',
        'color1'
        )">

            Add To Cart

        </button>

    </div>

    <!-- PRODUCT 2 -->

    <div class="product-card">

        <img
        src="products/bag.jpg"
        alt="Bag">

        <h3>Travel Bag</h3>

        <p>
            Premium quality travel backpack.
        </p>

        <h4>₹1299</h4>

        <select id="size2">
            <option>Small</option>
            <option>Medium</option>
            <option>Large</option>
        </select>

        <select id="color2">
            <option>Black</option>
            <option>Blue</option>
        </select>

        <button onclick="addProduct(
        2,
        'Travel Bag',
        1299,
        'products/bag.jpg',
        'size2',
        'color2'
        )">

            Add To Cart

        </button>

    </div>

    <!-- PRODUCT 3 -->

    <div class="product-card">

        <img
        src="products/headphone.jpg"
        alt="Headphone">

        <h3>Wireless Headphone</h3>

        <p>
            Noise cancelling Bluetooth headphone.
        </p>

        <h4>₹1999</h4>

        <select id="size3">
            <option>Standard</option>
        </select>

        <select id="color3">
            <option>Black</option>
            <option>White</option>
        </select>

        <button onclick="addProduct(
        3,
        'Wireless Headphone',
        1999,
        'products/headphone.jpg',
        'size3',
        'color3'
        )">

            Add To Cart

        </button>

    </div>

    <!-- ADD PRODUCTS 4–10 HERE -->

</section>

<script src="script.js"></script>

</body>
</html>
